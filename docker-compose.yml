services:
  db:
    image: postgres:16-alpine
    container_name: mini-crm-db
    environment:
      POSTGRES_USER: minicrm
      POSTGRES_PASSWORD: minicrm
      POSTGRES_DB: minicrm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minicrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini-crm-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://minicrm:minicrm@db:5432/minicrm
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mini-crm-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
